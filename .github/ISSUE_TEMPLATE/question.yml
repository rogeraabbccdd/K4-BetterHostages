name: Question / Support
description: Ask a question or request help
title: "[Question]: "
labels: ["question"]
assignees:
  - K4ryuu
body:
  - type: markdown
    attributes:
      value: |
        Have a question? Need help? We're here to assist!

  - type: dropdown
    id: sponsor
    attributes:
      label: Are you a GitHub Sponsor?
      description: "[Become a GitHub Sponsor](https://github.com/sponsors/K4ryuu) - Priority support from $15/month tier!"
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How urgent is your question?
      options:
        - Low - General inquiry
        - Medium - Need answer soon
        - High - Blocking my work
        - Critical - Production issue
      default: 0
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I...?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context or what you've tried so far
      placeholder: I've tried... but I'm not sure how to...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: SwiftlyS2 Version
      description: Which version are you using?
      placeholder: "e.g., v1.2.3"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Server Operating System
      description: What OS is the SERVER running on? (Required)
      options:
        - Windows
        - Linux
      default: 1
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any other information that might be helpful
      placeholder: Any additional information...
    validations:
      required: false