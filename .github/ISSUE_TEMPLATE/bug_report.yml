name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
assignees:
  - K4ryuu
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the form below with as much detail as possible.

  - type: dropdown
    id: sponsor
    attributes:
      label: Are you a GitHub Sponsor?
      description: "[Become a GitHub Sponsor](https://github.com/sponsors/K4ryuu) - Priority support from $15/month tier!"
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this bug?
      options:
        - Low - Minor issue, workaround available
        - Medium - Affects functionality but not critical
        - High - Significant impact on functionality
        - Critical - Blocking issue, immediate attention required
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened?
      description: Describe the bug and what you expected vs what actually happened
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SwiftlyS2 Version
      description: Which version are you using?
      placeholder: "e.g., v1.2.3"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Server Operating System
      description: What OS is the SERVER running on? (Required)
      options:
        - Windows
        - Linux
      default: 1
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or logs about the problem
      placeholder: Any additional information...
    validations:
      required: false