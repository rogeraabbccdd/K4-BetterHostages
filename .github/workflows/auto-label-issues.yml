name: Auto-label Issues

on:
  issues:
    types: [opened]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check sponsor status and add labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueAuthor = issue.user.login;

            console.log('Processing issue #' + issue.number);
            console.log('Author: ' + issueAuthor);
            console.log('Checking sponsor status...');

            // 🧪 TEST MODE: Treat repo owner as $15/month sponsor for testing
            if (issueAuthor.toLowerCase() === 'k4ryuu') {
              console.log('🧪 Test mode - treating repo owner as sponsor');

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['sponsor']
              });

              let message = `💖 **Thank you for being a GitHub Sponsor!**\n\n`;
              message += `Hi @${issueAuthor}, thank you so much for your support! As a **$15/month sponsor**, your issue will receive **priority review and triage**.\n\n`;
              message += `I'll get back to you as soon as possible. Your support helps keep this project alive and growing! 🚀`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });

              console.log('✓ Test sponsor label and comment added');
              return;
            }

            // Automatically check sponsor status for every issue
            try {
                // GraphQL query to check if user is a sponsor
                const query = `
                  query($sponsor: String!) {
                    user(login: $sponsor) {
                      sponsorshipsAsMaintainer(first: 100) {
                        nodes {
                          sponsorEntity {
                            ... on User {
                              login
                            }
                            ... on Organization {
                              login
                            }
                          }
                          tier {
                            monthlyPriceInDollars
                          }
                        }
                      }
                    }
                  }
                `;

                const result = await github.graphql(query, {
                  sponsor: 'K4ryuu'
                });

                // Check if issue author is in sponsors list
                const sponsors = result.user.sponsorshipsAsMaintainer.nodes;
                const isSponsor = sponsors.some(s =>
                  s.sponsorEntity.login.toLowerCase() === issueAuthor.toLowerCase()
                );

                if (isSponsor) {
                  // Add sponsor label
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['sponsor']
                  });
                  console.log('✓ Verified sponsor - added sponsor label');

                  // Get sponsor tier
                  const sponsorship = sponsors.find(s =>
                    s.sponsorEntity.login.toLowerCase() === issueAuthor.toLowerCase()
                  );
                  const tier = sponsorship?.tier?.monthlyPriceInDollars || 0;

                  // Add a thank you comment
                  let thankYouMessage = `💖 **Thank you for being a GitHub Sponsor!**\n\n`;
                  thankYouMessage += `Hi @${issueAuthor}, thank you so much for your support! `;

                  if (tier >= 15) {
                    thankYouMessage += `As a **$${tier}/month sponsor**, your issue will receive **priority review and triage**.\n\n`;
                    thankYouMessage += `I'll get back to you as soon as possible. Your support helps keep this project alive and growing! 🚀`;
                  } else {
                    thankYouMessage += `Your support helps keep this project alive and growing! 🚀\n\n`;
                    thankYouMessage += `*Although this tier doesn't include priority support, I greatly appreciate your contribution!* 🙏`;
                  }

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: thankYouMessage
                  });
                } else {
                  console.log('✓ Not a sponsor - no action needed');
                }
              } catch (error) {
                console.log('Error checking sponsor status: ' + error.message);
              }

            console.log('Done!');